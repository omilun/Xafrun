name: Question
description: Ask a question about Xafrun
title: "[Question] "
labels: [question]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any context that might help us answer your question (configuration, environment, etc.).
    validations:
      required: false
