name: CI — Sync GitOps

# Images are built locally (native arm64) and pushed manually.
# This workflow only keeps the gitops manifests in sync when VERSION changes.
on:
  push:
    branches: [master]
    paths:
      - 'VERSION'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (reads VERSION file if empty)'
        required: false

permissions:
  contents: read

jobs:
  update-gitops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then V=$(cat VERSION); fi
          echo "version=$V" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          repository: omilun/Talos-on-macos
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      - name: Update image tags
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          sed -i "s|ghcr.io/omilun/xafrun-backend:[^ ]*|ghcr.io/omilun/xafrun-backend:${VERSION}|g" gitops-repo/gitops/apps/xafrun/deploy/backend.yaml
          sed -i "s|ghcr.io/omilun/xafrun-frontend:[^ ]*|ghcr.io/omilun/xafrun-frontend:${VERSION}|g" gitops-repo/gitops/apps/xafrun/deploy/frontend.yaml
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/xafrun/deploy/backend.yaml gitops/apps/xafrun/deploy/frontend.yaml
          git diff --staged --quiet || git commit -m "chore: update xafrun images to ${VERSION}"
          git push
