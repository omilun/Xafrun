site_name: Fluxbaan
site_description: A real-time visual GitOps dashboard for Flux CD
site_author: omilun
site_url: https://fluxbaan.talos-tart-ha.talos-on-macos.com/docs/
repo_url: https://github.com/omilun/Fluxbaan
repo_name: omilun/Fluxbaan
edit_uri: edit/master/docs/
copyright: Copyright © 2026 Fluxbaan contributors

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle: { icon: material/brightness-7, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle: { icon: material/brightness-4, name: Switch to light mode }
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/omilun/Fluxbaan

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quick-start.md
    - Installation:
      - Helm: getting-started/install-helm.md
      - Kustomize: getting-started/install-kustomize.md
      - Local development: getting-started/local-dev.md
  - User Guide:
    - The dashboard: user-guide/dashboard.md
    - Filtering by namespace: user-guide/namespaces.md
    - Status ticker: user-guide/status-ticker.md
    - Resource statuses: user-guide/statuses.md
  - Architecture:
    - Overview: architecture/overview.md
    - Backend (informers + SSE): architecture/backend.md
    - Frontend (React Flow + dagre): architecture/frontend.md
    - RBAC & permissions: architecture/rbac.md
    - High Availability: architecture/high-availability.md
  - API Reference:
    - REST endpoints: api/rest.md
    - Server-Sent Events: api/sse.md
  - Contributing:
    - How to contribute: contributing/index.md
    - Development setup: contributing/dev-setup.md
    - Code of Conduct: contributing/code-of-conduct.md
    - Security policy: contributing/security.md
  - Roadmap: roadmap.md
  - Comparison: comparison.md
  - FAQ: faq.md
