{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "xafrun.fullname" . }}-reader
  labels:
    {{- include "xafrun.labels" . | nindent 4 }}
rules:
  # Flux source-controller CRDs
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories", "helmrepositories", "helmcharts", "ocirepositories", "buckets"]
    verbs: ["get", "list", "watch"]
  # Flux kustomize-controller CRDs
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  # Flux helm-controller CRDs
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
  # Flux image-reflector-controller CRDs
  - apiGroups: ["image.toolkit.fluxcd.io"]
    resources: ["imagerepositories", "imagepolicies", "imageupdateautomations"]
    verbs: ["get", "list", "watch"]
  # Flux notification-controller CRDs
  - apiGroups: ["notification.toolkit.fluxcd.io"]
    resources: ["receivers", "alerts", "providers"]
    verbs: ["get", "list", "watch"]
  # Core k8s resources (for inventory resolution)
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces", "services", "pods", "configmaps", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "xafrun.fullname" . }}-reader
  labels:
    {{- include "xafrun.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "xafrun.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "xafrun.fullname" . }}-reader
  apiGroup: rbac.authorization.k8s.io
{{- if .Values.rbac.allowReconcile }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "xafrun.fullname" . }}-reconciler
  labels:
    {{- include "xafrun.labels" . | nindent 4 }}
rules:
  # Patch annotations & spec.suspend for reconcile/suspend/resume actions.
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories", "helmrepositories", "helmcharts", "ocirepositories", "buckets"]
    verbs: ["patch", "update"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["patch", "update"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["patch", "update"]
  - apiGroups: ["image.toolkit.fluxcd.io"]
    resources: ["imagerepositories", "imageupdateautomations"]
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "xafrun.fullname" . }}-reconciler
  labels:
    {{- include "xafrun.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "xafrun.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "xafrun.fullname" . }}-reconciler
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
