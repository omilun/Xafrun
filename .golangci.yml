linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
  disable-all: false

linters-settings:
  goimports:
    local-prefixes: github.com/omilun/Fluxbaan
  revive:
    rules:
      - name: exported
        disabled: true
  misspell:
    locale: US

issues:
  exclude-rules:
    # Ignore errors from generated files
    - path: _test\.go
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10

run:
  timeout: 5m
